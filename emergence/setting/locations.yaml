# EMERGENCE — Named Locations
# Coordinates are approximate (lat,lon) for GM/map reference.
# Cross-references use faction ids from factions.yaml and npc ids from npcs.yaml.

locations:

  # ═══ CATSKILL THRONE / HUDSON VALLEY ═══

  - id: loc-mount-tremper
    display_name: Mount Tremper Command Site
    type: fortified-seat
    region: catskills
    coordinates: [42.04, -74.24]
    controller: catskill-throne
    population: ~400 (retinue + staff)
    defensive_capacity: very high — hardened pre-Onset federal facility, matter-manipulated walls, 160+ T5+ retinue
    economic_state: austere; tribute flows in, little flows out
    resources:
      - command bunker
      - matter-manipulated audience hall (Beatrice Amar's truth-field)
      - personal library (~5,000 volumes)
      - hardened communications (couriers only)
    notable_features:
      - Preston's hall (Auratic truth-zone)
      - external barracks for visiting retinue
      - a single heavy gate managed by the Shadow
    connections:
      - Hudson passes (tribute collection routes)
      - Catskill Throne tributary polities
      - Grey Walker's wandering range (occasional)
    current_events:
      - tribute-to-vassalage clock advancing
      - recent visit from Grey Walker emissary
    dangers:
      - Preston's own presence (for those who displease him)
      - retinue discipline strict
    opportunities:
      - audience with Preston (rare; granted for specific causes)
      - commissions from Whelan, Amar, or the Shadow
    description: >
      The site was a Cold War continuity-of-government bunker built into the mountain
      above the town. Preston seized it in the first month; his first act of governance
      was to reinforce its walls. A Species C artisan extended the audience hall with
      matter-manipulated stone that does not weather. The hall smells of cold air and
      machine oil. Preston rarely appears in it.

      Outside, the approach road is patrolled at three checkpoints. Visitors who pass
      the checkpoints are received at the outer barracks and processed through a
      series of formalities before the audience chamber. The formalities are not
      intimidation — they are calibration, and Whelan and Amar run them together.

  - id: loc-peekskill-reactor
    display_name: Peekskill Reactor Complex
    type: industrial-fortified
    region: lower-hudson-valley
    coordinates: [41.28, -73.92]
    controller: bear-house
    population: ~3,000 (reactor crew + Bear-House retinue)
    defensive_capacity: high — matter-manipulated perimeter, trained matter-manipulators, thermal-containment capacity as defensive feature
    economic_state: electricity production (partial grid ~10,000 households), fabrication exports
    resources:
      - only functional electrical grid in mid-Atlantic
      - matter-manipulator workshop
      - reactor containment expertise
    notable_features:
      - the reactor itself (Indian Point 2/3, stabilized)
      - Kostas's personal quarters (adjacent to containment)
      - perimeter walls (matter-manipulated)
    connections:
      - Peekskill town (integrated)
      - Cortlandt (protected)
      - Yonkers Compact (commercial partner)
      - Catskill Throne (tributary)
    current_events:
      - quiet succession-provisioning (Measurer)
      - reactor operational margins narrower than public
    dangers:
      - narrow reactor margins — unannounced failure risk [GM]
      - Kostas's mineralization rate (terminal)
    opportunities:
      - electrical-goods fabrication contracts
      - matter-manipulation training (rare)
    description: >
      The complex was the Indian Point nuclear generating station. On Onset day its
      cooling systems failed. Kostas arrived on day 10 and stabilized it at the cost
      of his left face and arm. The reactor now operates as a peculiar hybrid —
      conventional fission cores with matter-manipulated containment and thermal
      management.

      The compound grew outward from Kostas's containment work. Walls laid with his
      hands in the first years still stand; his crews have added to them. The
      electrical grid reaches ten thousand households, a marvel in the region. What
      the households pay for the electricity is a matter of Bear-House policy that
      Kostas sets personally.

  - id: loc-yonkers-council-chamber
    display_name: Yonkers Compact Council Chamber
    type: civic-hall
    region: lower-hudson-valley
    coordinates: [40.94, -73.87]
    controller: yonkers-compact
    population: ~200 (administrative staff, council + rotating members)
    defensive_capacity: low — community militia only, but reputational protection is strong
    economic_state: modest surplus from biokinetic ag exports; healing-service revenue
    resources:
      - Three Judges daily audience
      - biokinetic healing chamber
      - central dispute-arbitration hall
    notable_features:
      - open-plan chamber (no walls between audience and administrative space)
      - Abel's sleeping bench in the corner of the chamber
      - Villanueva's private interview room (for foreseen injuries)
    connections:
      - Yonkers Compact (whole)
      - Bear-House (commercial)
      - Catskill Throne (tributary)
    current_events:
      - Villanueva's retirement deliberation
      - Three Judges' negotiation with Catskill Throne (informal)
    dangers: low
    opportunities:
      - audiences with any of the Three Judges or Abel
      - biokinetic consultation
    description: >
      The chamber is a pre-Onset community center converted to governance use. There
      are no gates or guards at the door. Citizens come with disputes and wait on
      benches. Morning is the busiest time; afternoons are reserved for complex cases.

      The Three Judges sit on three chairs that are not elevated above the chamber
      floor. Abel sleeps in the corner and rises when his attention is needed. The
      building is heated in winter by Obi's biokinetic work and ventilated in summer
      by the open windows. It smells of people and tea.

  - id: loc-kingston-hv
    display_name: Kingston
    type: trade-town
    region: upper-hudson-valley
    coordinates: [41.93, -73.99]
    controller: yonkers-compact (commercial; not garrisoned)
    population: ~18,000
    defensive_capacity: moderate — community militia, Yonkers-trained biokinetics
    economic_state: active trade town; Hudson waypoint
    resources:
      - river port
      - trade market
      - grain storage
    notable_features:
      - the Stockade District (partial pre-Onset preservation)
      - market square
    connections:
      - Yonkers (commercial)
      - Bear-House (neighbors)
      - Catskill Throne (tributary)
    current_events:
      - increased tribute to Catskill Throne this quarter
    dangers: low
    opportunities:
      - commerce, courier work
    description: >
      Kingston survived the collapse comparatively well — its population was already
      acclimated to semi-rural life, and the Hudson River provided transport
      continuity when roads failed. The Stockade District preserves enough pre-Onset
      structures to remind visitors of what towns looked like before.

      It is the primary Yonkers Compact trading town. Commerce flows daily. The
      Compact does not formally govern Kingston but its influence is pervasive and
      welcomed.

