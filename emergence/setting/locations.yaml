    notable_features:
      - the falls (altered with faint water-affinity residue)
      - Marla's small hall
    connections:
      - Catskill Throne (reluctant tributary)
    current_events:
      - Marla seeks Bourse correspondence route bypassing Throne notice
    dangers:
