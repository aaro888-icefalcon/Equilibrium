      anteroom with three chairs and a small table. The actual workshop is a long
      room with north-facing windows and benches for Kuan and his three primary
      apprentices.

      The anomalous object is not in the workshop. It is stored separately, in a
      location only Kuan and one apprentice know. Kuan studies it on specific days
      when he has told no one where he will be.

