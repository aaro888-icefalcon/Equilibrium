      geography; the walls of buildings lean in directions that would require
      kinetic force-vector analysis to justify. Flatbush under Tenno is calmer but
      poorer. Bay Ridge under Elena is the best-maintained of the districts.

      Cross-district travel requires knowledge of which Lord holds which block and
      which greetings are acceptable at which checkpoints.

  - id: loc-flushing-workshop
