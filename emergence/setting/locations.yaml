    description: >
      Marla's demesne is small by faction standards and conspicuous only for its
      location. The falls are one of the more striking natural features in the
      Catskills; Marla's water-affinity has subtly altered them. Her retinue is
      thirty armed personnel, mostly former neighbors. Catskill Throne collects
      token tribute and leaves her otherwise alone.

  - id: loc-hollow-choir-range
    display_name: Hollow Choir Range
    type: eldritch-contested-wilderness
    region: eastern-catskills
    coordinates: [42.15, -74.10]
    controller: hollow-choir (eldritch cluster)
    population: ~20 cluster-bodies + unknown transient eldritch
    defensive_capacity: unknown (cluster is fungible; hits to cluster-bodies do not reduce function below threshold)
    economic_state: not applicable
    resources: none accessible to humans
    notable_features:
      - valleys where Hollow Choir sub-audible vocalizations carry
      - ceded territory (Preston has stopped patrolling)
    connections:
      - adjacent to loc-kaaterskill-falls
      - adjacent to Catskill Throne tributary polities
    current_events:
      - continued slow expansion
    dangers: extreme
    opportunities: none reasonable
    description: >
      Three eastern Catskill valleys in which the Hollow Choir operates. Preston's
      patrols entered once, in month 8 of Year 1, and killed three cluster-bodies;
      the cluster reformed functional capability within weeks. Preston declared the
      valleys "ceded territory" and withdrew. They are now effectively lost to human
      access.

      Travelers who enter report a feeling of being listened to — the sub-audible
      vocalizations carry across the valleys. Most travelers who enter do not return.

  # ═══ NYC METRO ═══

  - id: loc-manhattan-midtown
    display_name: Midtown Manhattan
    type: contested-salvage-zone
    region: manhattan-core
    coordinates: [40.76, -73.98]
    controller: contested (Tower Lords via salvage crews; no governance)
    population: ~50,000 (salvagers, holdouts, transients)
    defensive_capacity: none (individual crews defend themselves)
    economic_state: salvage-extractive; declining yields
    resources:
      - pre-Onset building interiors
      - commercial zone warehouses
      - scattered intact inventory
    notable_features:
      - 42nd Street Line (informal border to Financial District)
      - Central Park Wildland (biokinetically altered; altered fauna; altered fish in lakes)
      - Metropolitan Museum of Art (partially looted, largely intact)
    connections:
      - Tower Lords of Brooklyn (salvage)
      - Staten Citadel (harbor access, toll)
      - Iron Crown (salvage partner)
    current_events:
      - salvage yields declining year-over-year
      - first rumors of movement in the Lower East Side ruins
    dangers:
      - altered fauna (Central Park Wildland)
      - kinetic-corruption zones
      - rival salvage crews
    opportunities:
      - salvage work
      - specific-item retrieval
    description: >
      Midtown is working ruin. The streets are clear enough for hand-carts; the
      larger avenues have been kept open by salvage crews for pull-cart routes.
      Most buildings are accessible. Some are structurally compromised. Crews
      working in paired buildings know each other by signals.

      The Metropolitan Museum stands mostly intact because its contents require
      specialist appraisal that no warlord employs. A few houses (Tanaka's
      particularly) have made quiet visits.

  - id: loc-financial-district
    display_name: The Financial District
    type: anomalous-closed-zone
    region: manhattan-core
    coordinates: [40.71, -74.01]
    controller: "The Echo" (eldritch sovereign)
    population: unknown; negligible human presence
    defensive_capacity: not applicable (the zone itself is the defense)
    economic_state: none
    resources:
      - bank vaults (pre-Onset gold, financial records)
      - Federal Reserve area
    notable_features:
      - progressive memory loss on entry
      - occasional physical movement of objects
      - cold zones without visible cause
    connections:
      - 42nd Street Line (informal border)
    current_events:
      - Echo has not moved in four years (stable)
      - rumors that deep-salvage runs have triggered events
    dangers: extreme (anomalous)
    opportunities:
      - extreme-risk salvage (Bourse occasionally commissions)
    description: >
      South of Canal Street, memory begins to fail. The effect is progressive; a
      traveler who stays two hours will forget fragments. A traveler who stays eight
      hours will forget whole days. A traveler who stays a full night may not
      remember their own name.

      The vaults contain gold no one has retrieved. The archives contain records no
      one has read. The Echo does not manifest directly; its presence is inferred
      from its effects. No contact has been established. No communication has been
      attempted successfully.

