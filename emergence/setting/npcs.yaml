    display_name: Captain Sarah Ngo
    faction_affiliation: fed-continuity (Prince George's District)
    location: PG County
    species: metahuman-I
    age_at_game_start: 35
    manifestation: T5 Physical primary; Perceptual-T4 (species-enhanced sight + tactical-awareness) secondary
    role: Fed Continuity district officer; Species I cross-tie
    goals:
      - serve Fed Continuity professionally
      - protect Species I PG County kin (her own kin)
      - manage divided loyalties carefully
    relationships:
      - serves npc-alcott
      - kin of Flores-kin (npc-josefina-flores)
      - peer of other district officers
    resources:
      - PG District command
      - kin cross-tie
    what_they_know:
      - Reeve's anti-Species-I operations in her district
      - which district officers are quietly defecting to Reeve
    what_they_want_from_the_player:
      - intelligence on Reeve's PG operations
      - protection for Species I kin in her district
    standing_with_player_default: cautious-friendly
    voice: >
      Ngo speaks the same way to her commanders as to her kin elders.
      She is quietly pious about her professional obligation. She has
      not been asked to choose between Fed Continuity and Species I.
      She knows the day is coming.
    hooks:
      - Ngo commissions intelligence work
      - a Reeve operation against Species I requires response
      - she warns the player of district officer defection

