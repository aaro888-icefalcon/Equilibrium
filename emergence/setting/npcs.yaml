  - id: npc-grey-walker
    display_name: Grey Walker
    faction_affiliation: warped (independent)
    location: Catskills interior
    species: warped-bear (eastern black bear)
    age_at_game_start: "[UNSPECIFIED] — claims pre-human existence"
    manifestation: T9 (cognition operating on scales humans cannot map)
    role: regional Warped sovereign-equivalent; Catskill region
    goals:
      - perpetuate territory
      - participate in inter-Warped coordination
      - maintain non-aggression with Catskill Throne
    relationships:
      - non-aggression pact with npc-preston (informal)
      - coordinates with other T8+ Warped (Old Black, Sparrowhand)
    resources:
      - extraordinary tier
      - Warped network
    what_they_know:
      - the Prior Cycles theology
      - regional Warped movements
      - what the eldritch Sovereigns are (his account differs from human assumptions)
    what_they_want_from_the_player:
