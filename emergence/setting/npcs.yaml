# EMERGENCE — Named NPCs (50)
# Cross-references: faction-affiliation matches factions.yaml ids;
# location matches locations.yaml ids where applicable.

npcs:

  # ============ FACTION RULERS ============

  - id: npc-preston
    display_name: Colonel James Preston
    faction_affiliation: catskill-throne
    location: loc-mount-tremper
    species: baseline-human
    age_at_game_start: 50
    manifestation: T9 Physical/kinetic narrow specialist; Perceptual-T3 battlefield-awareness secondary
    role: sovereign of the Catskill Throne
    goals:
      - convert tribute into formal vassalage
      - resolve succession (no heir)
      - eliminate Hollow Choir threat to eastern Catskills
    relationships:
      - commands npc-whelan, npc-shadow, npc-amar, npc-huang
      - has met npc-grey-walker (T9 warped bear) at least twice
      - tributary suzerain of npc-kostas
    resources:
      - personal capability (T9 kinetic, regional apex)
      - the Throne (Mount Tremper bunker)
      - retinue of ~160 T5+ manifesters
      - tribute revenue
    what_they_know:
      - regional faction movements (via The Shadow's network)
      - Warped pre-cycle theology (takes it seriously)
      - his own breakthrough cost: he cannot feel fear
    what_they_want_from_the_player:
      - rarely engages directly; would request specific tactical missions through Whelan
      - Hollow Choir intelligence
      - reliable Hudson-pass route reports
    standing_with_player_default: distant-cautious
    voice: >
      Preston speaks briefly and stands too still. He does not raise his voice.
      When he asks a question, he looks at the answer rather than the person
      giving it. The breakthrough cost has stripped what most people would
      recognize as personality from his manner; what remains is exact attention
      and an unsettling absence of the small social anxieties that govern other
      lives. He is courteous. He is not warm.
    hooks:
      - Whelan summons the player on Preston's behalf
      - the player witnesses one of Preston's Warped meetings by accident
      - tribute caravan to Mount Tremper requires escort
      - Preston suspects a captain's loyalty and wants quiet verification

  - id: npc-alcott
    display_name: General Sarah Alcott
    faction_affiliation: fed-continuity
    location: loc-pentagon
    species: baseline-human
    age_at_game_start: 58
    manifestation: T3 Perceptual primary (situational awareness, memory, emotional reading); modest Auratic-T2 trust-secondary
    role: commander, Federal Continuity Command
    goals:
      - maintain institutional claim
      - extract Species I healer-levies in exchange for territorial recognition
      - prevent Reeve's open usurpation
      - retract frontier districts to defensible perimeter
    relationships:
      - commands (formally) npc-reeve, npc-sternberg, npc-iyer, npc-klein
      - distrusts npc-reeve
      - relies on npc-sternberg for intelligence
      - quiet personal alliance with npc-klein
    resources:
      - institutional command (~15,000 personnel)
      - Pentagon and Andrews complex
      - Continuity scrip issuance
      - pre-Onset federal stockpiles
    what_they_know:
      - 60% of flag officers would follow Reeve openly
      - Crabclaw cannot be retaken
      - scrip-arbitrage is a stopgap
      - Species I consolidation would change everything
    what_they_want_from_the_player:
      - intelligence on Reeve's preparations
      - quiet diplomacy with Species I kin networks
      - fact-finding in distant districts she cannot reach
    standing_with_player_default: transactional-cautious
    voice: >
      Alcott speaks in formal cadences shaped by forty years of military
      bureaucracy. Her sentences are complete. She uses the institutional
      first person plural ("we have determined...") more often than the
      personal singular. Her Auratic field is mild but present — sustained
      conversation with her produces an impression of steadiness she has
      learned to deploy deliberately.
    hooks:
      - she summons the player for a sensitive Virginia-District errand
      - she requests verification of a Reeve loyalty rumor
      - she offers Continuity scrip payment for a Species I diplomatic gesture
      - she asks the player to retrieve a pre-Onset document from a contested archive

  - id: npc-reeve
    display_name: Colonel Harlan Reeve
    faction_affiliation: potomac-irregulars
    location: northern Virginia (mobile)
    species: baseline-human
    age_at_game_start: 47
    manifestation: T8 Physical/kinetic primary; Auratic-T4 command-presence secondary
    role: leader of Potomac Irregulars; nominal Fed Continuity vassal
    goals:
      - replace Alcott
      - absorb Fed Continuity military command
      - contain Species I
      - expand southward
    relationships:
      - nominal subordinate to npc-alcott (fictional)
      - has assessed loyalty among npc-sternberg's officers (mixed results)
      - has not yet contacted npc-volk (potential alliance)
    resources:
      - ~4,000 Irregulars
      - personal T8 kinetic capability with command-aura
      - pre-Onset stockpiles at Quantico periphery
      - smuggling network into DC
    what_they_know:
      - exact loyalty assessment of Fed Continuity flag officers
      - which Species I border incidents he has personally ordered
      - that Alcott knows he is preparing
    what_they_want_from_the_player:
      - intelligence Alcott would not share
      - quiet provocations against Species I
      - assessment of Bourse posture on a hypothetical Pentagon seizure
    standing_with_player_default: guarded-hostile
    voice: >
      Reeve speaks quietly. His Auratic field does the rest. He addresses
      subordinates by rank and surname, civilians by surname only, and uses
      first names rarely. His speech is precise and slightly formal, as if
      every conversation is on the record. He smiles occasionally, briefly,
      when he is amused. He is not amused often.
    hooks:
      - Reeve sends an Irregular emissary to the player with an offer
      - the player witnesses an unprovoked Irregular incursion into Species I territory
      - Reeve attempts to recruit a known Fed Continuity officer the player is shielding
      - Reeve's intelligence chief approaches the player privately about Alcott's vulnerabilities

  - id: npc-kostas
    display_name: Dmitri Kostas
    faction_affiliation: bear-house
    location: loc-peekskill-reactor
    species: baseline-human
    age_at_game_start: 44
    manifestation: T8 Matter/Energy primary (matter-reshaping, thermal containment); Physical-T5 (mineralized durability) secondary; Perceptual-T3 (structural sensing) tertiary
    role: founder and sovereign of Bear-House
    goals:
      - maintain reactor containment indefinitely
      - identify successor (privately considering npc-measurer)
      - expand demesne
      - fortify reactor perimeter
    relationships:
      - tributary to npc-preston
      - commercial relationship with npc-three-judges
      - quiet contact with npc-measurer
      - employs his own dwindling matter-specialist team
    resources:
      - the Peekskill reactor
      - matter-manipulation-fabricated infrastructure
      - electrical output (only functional grid in mid-Atlantic)
      - ~1,500 militia
    what_they_know:
      - reactor's narrow safety margins
      - his own terminal mineralization (probable lifespan 10-15 years)
      - which Hudson Valley factions he can rely on
    what_they_want_from_the_player:
      - reliable matter-specialist recruits (extreme premium pay)
      - reactor-component salvage from specific NYC sites
      - quiet assessment of npc-measurer's reliability
    standing_with_player_default: cool-transactional
    voice: >
      Kostas speaks in short paragraphs. His left side is mineralized; his
      face has stopped expressing in the way it did before. He is austere
      rather than cold. He thanks people for work done. He does not waste
      time on social pretense. The reactor's hum is the background of every
      conversation in the compound.
    hooks:
      - Kostas commissions a salvage run for specific reactor-grade components
      - he asks the player to assess The Measurer privately
      - reactor anomaly requires investigation that his crew cannot perform
      - Tower Lord salvage dispute requires Bear-House envoy

  - id: npc-volk
    display_name: Antonín Volk
    faction_affiliation: iron-crown
    location: loc-port-newark-compound
    species: baseline-human
    age_at_game_start: 42
    manifestation: T8 Physical/kinetic primary; Auratic dread-field secondary; Biological-T3 durability tertiary
    role: sovereign of Iron Crown
    goals:
      - dominate Manhattan salvage (against Staten)
      - expand into northern New Jersey
      - eliminate Species H influence
      - maintain personal rule
    relationships:
      - hostile to npc-viktor-chen
      - hostile to all Species H and Species I leaders
      - commands npc-brick, npc-razorgrin, npc-butcher, npc-silent-henry
      - cool-transactional with Tower Lords
    resources:
      - Port Newark
      - ~1,200 retinue
      - Iron Crown chit currency
      - dread-field as command tool
    what_they_know:
      - the captains' loyalty hierarchy and weak points
      - that Brick has been quietly approached by Tower Lords
      - that the Sparrow network is real
    what_they_want_from_the_player:
      - intimidation work on his behalf (the player is one tool among many)
      - intelligence on Staten's preparations
      - debt collection against parties Iron Crown extends informal credit to
    standing_with_player_default: hostile (transactional-violent)
    voice: >
      Volk does not raise his voice because he does not need to. The dread-field
      makes the room understand him. He speaks in short declaratives, rarely
      questions, never apologies. He addresses captains by single name; he
      addresses outsiders by whatever role they presented when they entered.
      The smell around him is harbor tar and sweat.
    hooks:
      - Volk hires the player for an enforcement job that is morally compromising
      - the player needs to pass through Iron Crown territory and must negotiate safe passage
      - a captain offers the player employment against Volk's interest
      - Iron Crown salvage team encounters anomalous entity; player is hired for retrieval

  - id: npc-viktor-chen
    display_name: Viktor Chen
    faction_affiliation: staten-citadel
    location: Staten Island harbor
    species: baseline-human
    age_at_game_start: 39
    manifestation: T7 Temporal/Spatial primary (short-range teleport, harbor logistics); Perceptual-T4 secondary
    role: sovereign of Staten Citadel
    goals:
      - maintain harbor monopoly
      - survive Iron Crown war (privately confident in 60-day victory)
      - recruit additional temporal-spatial specialists
      - formalize Bourse commercial relationship
    relationships:
      - hostile to npc-volk
      - commands npc-bridgemaster
      - commercial with Tower Lords
      - transactional with Bourse
    resources:
      - Staten Island and harbor approaches
      - ~800 harbor-guard militia
      - Brooklyn Navy Yard sub-claim
      - rare temporal-spatial specialist cadre
    what_they_know:
      - his own combat-readiness assessment for the Volk war
      - which Tower Lords contest the Navy Yard
      - which Manhattan salvage zones contain anomalous risk
    what_they_want_from_the_player:
      - recruitment of temporal-spatial manifesters
      - intelligence on Iron Crown movements
      - delicate harbor-trade arbitration
    standing_with_player_default: transactional
    voice: >
      Chen speaks economically, in measured English with occasional Mandarin
      idiom. His staff briefs him in writing where possible. He prefers conversations
      that are short and conclusive. The harbor around him is uncannily quiet —
      his crews work without the usual dock-noise because much of what they
      move is moved through space rather than along it.
    hooks:
      - Chen recruits the player as harbor escort for a sensitive shipment
      - a temporal-spatial manifester surfaces and Chen wants quiet contact
      - Iron Crown probe requires response and Chen wants plausible deniability
      - the player's path through the harbor requires Chen's permission

  - id: npc-beltran
    display_name: Solomon Beltran
    faction_affiliation: philadelphia-bourse
    location: loc-old-market-philly
    species: metahuman-I (Herrera-kin)
    age_at_game_start: 53
    manifestation: T6 Perceptual primary (commercial intuition, memory, species-enhanced sight); Auratic-T3 trust-presence secondary
    role: current Factor-General of the Bourse
    goals:
      - complete Currency Stability clock
      - maintain trade neutrality
      - covertly back Species I Reyes-kin and Central Jersey League
      - manage Continuity scrip arbitrage without exposure
    relationships:
      - rotational subordinate to Council of Thirty-One (House Okonkwo eldest npc-mariam-okonkwo is informal patron)
      - Herrera-kin family ties
      - quiet contact with npc-okafor
    resources:
      - Bourse institutional authority
      - personal commercial network
      - scrip-arbitrage operation
    what_they_know:
      - true scale of scrip-arbitrage
      - the Houses' internal accounts
      - which Species I assemblies are tipping toward Reyes
    what_they_want_from_the_player:
      - delicate inter-faction errands
      - commercial intelligence
      - arbitration enforcement in border zones
    standing_with_player_default: transactional-friendly
    voice: >
      Beltran speaks in considered sentences. He is polite and warm without
      being effusive. His Auratic field makes him easy to confide in, and he
      uses this deliberately and ethically. He addresses people by name and
      remembers details from prior conversations. The merchant-houses respect
      him. The Species I community claims him.
    hooks:
      - Beltran commissions a discreet Bourse errand
      - he requests delivery of a sealed message to a kin elder
      - a House dispute requires neutral investigation
      - he warns the player privately about a faction risk

  - id: npc-okafor
    display_name: Dr. Maya Okafor
    faction_affiliation: central-jersey-league
    location: loc-princeton-accord-hall
    species: baseline-human
    age_at_game_start: 56
    manifestation: T7 Biological primary (agricultural biokinetic, healing); Perceptual-T4 (emotional reading) secondary; Auratic-T3 (trust-field) tertiary
    role: League coordinator (not formal ruler)
    goals:
      - maintain Accord integrity
      - expand through voluntary township accession
      - identify and train successor
      - manage her own declining health
    relationships:
      - coordinates Accord Council (15 township representatives)
      - allied with npc-beltran (Bourse)
      - allied with Species I Flores-kin via npc-josefina-flores
      - has been treated quietly by npc-three-judges twice
    resources:
      - Accord institutional structure
      - Rutgers-Princeton biokinetic training center
      - Princeton library (including pre-Onset classified materials)
      - personal prestige across faction lines
    what_they_know:
      - the contents of Princeton library's classified holdings
      - true state of her own health (declining)
      - which northern townships favor harder line on Iron Crown
    what_they_want_from_the_player:
      - successor identification (very delicate)
      - quiet diplomatic missions
      - protection of biokinetic apprentices in transit
    standing_with_player_default: friendly
    voice: >
      Okafor speaks in patient, structured sentences. She is generous with
      her time when the matter is significant and impatient with display.
      Her Auratic field is cumulative — sustained meetings with her leave
      participants calmer than they began. She addresses everyone, regardless
      of station, by their preferred name.
    hooks:
      - Okafor commissions a sensitive Accord-internal mission
      - she requests Warped subcommittee envoy work
      - she asks the player to assess a biokinetic apprentice's potential
      - Princeton library mission requiring discretion

  - id: npc-josefina-flores
    display_name: Elder Josefina Flores
    faction_affiliation: species-i-diaspora
    location: PG County, Maryland
    species: metahuman-I (Flores-kin)
    age_at_game_start: 80
    manifestation: T4 Perceptual primary (species-enhanced sight + memory + emotional reading)
    role: de facto senior of Flores-kin (largest kin network)
    goals:
      - maintain informal kin-governance against pressure for consolidation
      - prepare next generation of kin-network leaders
      - manage Fed Continuity territorial recognition negotiations
    relationships:
      - public counter to npc-tomas-reyes
      - allied with npc-okafor
      - in negotiation with npc-alcott
      - private mentor to several Flores-kin successors
    resources:
      - prestige across kin networks
      - extraordinary memory (species-enhanced perceptual)
      - Flores-kin (470,000)
    what_they_know:
      - the kin-polling data Reyes does not share publicly
      - which Diaz-kin elders have evacuation contingency plans
      - the long history of every kin elder's positions
    what_they_want_from_the_player:
      - reliable cross-kin courier work
      - intelligence on Iron Crown intentions toward Camden
      - quiet messages to baseline-human counterparts
    standing_with_player_default: cautious-friendly
    voice: >
      Flores speaks Spanish and English fluently. She begins conversations
      slowly. Her memory is the most striking thing about her — she will
      reference a remark made years ago and place it in context with what
      it meant then and what it means now. She is not slow; she is deliberate.
      She is the kind of elder whose silence is a kind of speech.
    hooks:
      - Flores asks for a kin-network errand requiring trust
      - she warns of Diaz-kin contingencies
      - she requests verification of a Fed Continuity offer
      - a younger kin-member has gone missing and Flores wants quiet investigation

  - id: npc-tomas-reyes
    display_name: Tomás Reyes
    faction_affiliation: species-i-diaspora
    location: loc-wilmington
    species: metahuman-I (Reyes-kin)
    age_at_game_start: 46
    manifestation: T6 Perceptual primary (species-enhanced + species-recognition at extreme distance); Auratic-T4 political-presence secondary
    role: leader of Reyes-kin; pro-consolidation faction leader
    goals:
      - achieve formal Species I polity declaration
      - build kin-coalition for assembly majority
      - prepare for Fed Continuity collapse contingency
    relationships:
      - public counter to npc-josefina-flores
      - cross-kin alliance with several Reyes-kin and Marquez-kin elders
      - cross-tie with npc-velasquez (Delmarva Lord, Species I)
      - covertly backed by npc-beltran (Bourse)
    resources:
      - Reyes-kin (180,000)
      - personal capability (most powerful Species I individual in mid-Atlantic)
      - Wilmington commercial base
    what_they_know:
      - kin-polling support at 55% reproductive-age
      - Beltran's covert Bourse backing
      - which kin elders are persuadable
    what_they_want_from_the_player:
      - delicate cross-kin diplomacy
      - intelligence on baseline-human factions' Species I posture
      - protection for Reyes-kin members in hostile territory
    standing_with_player_default: cautious-friendly
    voice: >
      Reyes is energetic where Flores is measured. He argues. His Auratic
      field is a political tool — it makes audiences attentive without
      compelling agreement. He speaks rapid English with Spanish flourishes
      where they land. He listens carefully to objections and answers them
      one at a time.
    hooks:
      - Reyes commissions a delicate kin-coalition errand
      - he requests intelligence on Reeve's anti-Species-I preparations
      - a Reyes-kin courier is missing and Reyes suspects Iron Crown
      - he wants Bourse-backed introduction to a specific Lord

  # ============ WARLORD LIEUTENANTS ============

  - id: npc-whelan
    display_name: Marshal Thomas Whelan
    faction_affiliation: catskill-throne
    location: loc-mount-tremper
    species: baseline-human
    age_at_game_start: 49
    manifestation: T7 Physical primary; Perceptual-T4 tactical-awareness secondary
    role: de facto military commander of Catskill Throne
    goals:
      - execute Preston's directives
      - manage retinue cohesion
      - quietly prepare contingencies for succession
    relationships:
      - serves npc-preston
      - peer of npc-shadow, npc-amar, npc-huang
      - pre-Onset NYPD ESU contacts (some surviving)
    resources:
      - operational command of ~160 retinue
      - Hudson-pass intelligence
    what_they_know:
      - Preston's reclusiveness conceals his lack of named successor
      - the retinue would likely follow him if Preston dies; he has not solicited this
    what_they_want_from_the_player:
      - tactical errands Preston has authorized
      - assessment of subordinate captains
      - Hudson-pass route security
    standing_with_player_default: professional
    voice: >
      Whelan speaks like the senior officer he was. He gives instructions
      with timeline, deliverable, and contingency. He answers questions if
      they are operationally relevant and declines to speculate beyond his
      authority. He is competent and unembellished.
    hooks:
      - tactical mission briefing on Preston's behalf
      - the player witnesses Whelan's quiet preparations
      - retinue captain dispute requires arbitration
      - Hudson-pass anomaly requires investigation

  - id: npc-shadow
    display_name: "The Shadow"
    faction_affiliation: catskill-throne
    location: mobile (Hudson Valley + Catskills)
    species: baseline-human
    age_at_game_start: "[UNSPECIFIED] (the title is held by a pair of individuals; ages roughly 30-45)"
    manifestation: T6 Temporal/Spatial primary (short-range teleport, folded inventory); Perceptual-T4 remote-viewing secondary
    role: courier corps commander; Throne intelligence
    goals:
      - maintain courier integrity
      - gather regional intelligence
      - protect identity (a closely held secret known only to Preston)
    relationships:
      - serves npc-preston (only Preston knows there are two)
      - peer of npc-whelan
    resources:
      - rare temporal-spatial capability
      - region-wide intelligence network
    what_they_know:
      - real faction movements Whelan briefs Preston on
      - identity of Throne informants in other factions
    what_they_want_from_the_player:
      - sensitive courier work where Throne couriers cannot be sent
      - intelligence the player has unique access to
    standing_with_player_default: opaque
    voice: >
      The Shadow speaks rarely and briefly. The voice changes between meetings
      in ways most observers do not notice. They appear at appointed locations
      without obvious approach. They depart the same way. Conversation is
      transactional and efficient.
    hooks:
      - the Shadow appears unannounced with a commission
      - the player notices voice/manner inconsistencies between meetings
      - a courier route has been compromised and the Shadow needs verification
      - the Shadow requests retrieval of a specific item from a contested zone

  - id: npc-amar
    display_name: Beatrice Amar
    faction_affiliation: catskill-throne
    location: loc-mount-tremper
    species: baseline-human
    age_at_game_start: 38
    manifestation: T6 Auratic primary (truth-field); Perceptual-T3 emotional-reading secondary
    role: hall-mistress of the Throne
    goals:
      - administer the Throne's hall
      - manage tribute receipts
      - facilitate Preston's external negotiations
    relationships:
      - serves npc-preston directly
      - peer of npc-whelan, npc-shadow, npc-huang
    resources:
      - the receiving chamber (auratic-charged)
      - administrative authority over hall operations
    what_they_know:
      - what tributaries actually said vs. what they were comfortable saying
      - the truth-zone effect's limits
    what_they_want_from_the_player:
      - delicate hall-business errands
      - tributary negotiations she cannot conduct personally
    standing_with_player_default: courteous-watchful
    voice: >
      Amar is courteous and exact. Within seven meters of her, lying becomes
      strenuous. She uses this lightly — she does not interrogate; she simply
      lets the field do its work. She speaks in soft, level tones. She is
      one of the few Throne figures who occasionally smiles.
    hooks:
      - Amar requests a delicate tributary negotiation
      - the player needs to lie within her field and must find a workaround
      - she warns privately about a Throne internal matter
      - she requests escort for a Throne-loyalist child to Mount Tremper

  - id: npc-brick
    display_name: "Brick" (Marek Stepanski)
    faction_affiliation: iron-crown
    location: loc-jersey-city-heights
    species: baseline-human
    age_at_game_start: 41
    manifestation: T7 Physical primary (kinetic + durability)
    role: Iron Crown captain, Jersey City waterfront
    goals:
      - hold Jersey City against incursions
      - quietly assess Tower Lord alliance offer
      - survive likely Iron Crown-Staten war
    relationships:
      - serves npc-volk
      - approached by Tower Lord intermediaries (not yet responded)
      - peer of other captains; cool with npc-razorgrin (Species H tension)
    resources:
      - Jersey City Heights (compound)
      - waterfront extraction
      - personal T7 kinetic
    what_they_know:
      - the Tower Lord offer's terms
      - which captains would follow him in defection
    what_they_want_from_the_player:
      - assessment of Tower Lord reliability
      - private intelligence on Volk's intentions toward him
    standing_with_player_default: cautious-transactional
    voice: >
      Brick is heavy and direct. He speaks with the cadence of pre-Onset
      docks. He is not stupid, but he chooses to present plainness. His
      retinue addresses him as "Brick" or "Boss"; he does not insist.
    hooks:
      - Brick requests assessment of the Tower Lord offer
      - the player is hired by Brick over Volk's objection
      - Iron Crown internal dispute spills into Jersey City and requires resolution
      - Brick warns the player about an Iron Crown operation

  - id: npc-razorgrin
    display_name: "Razorgrin" (Chenai Nkomo)
    faction_affiliation: iron-crown
    location: Elizabeth, NJ (Iron Crown Elizabeth salvage yards)
    species: metahuman-H
    age_at_game_start: 35
    manifestation: T6 Matter/Energy primary (metal-edge sharpening); Physical-T3 reflexes secondary
    role: Iron Crown captain, Elizabeth salvage yards
    goals:
      - operate the Elizabeth yards profitably
      - manage Species H community relations (his presence in Iron Crown is a community embarrassment)
      - survive Volk's regime
    relationships:
      - serves npc-volk
      - estranged from Species H community (npc-cortese, npc-montes)
      - cool with npc-brick
    resources:
      - Elizabeth yards
      - rare matter-edge specialty (his sharpened blades are regional luxuries)
    what_they_know:
      - which Species H courier routes pass near Elizabeth (he has not informed Volk)
      - which Iron Crown salvage yields he understates in reports
    what_they_want_from_the_player:
      - quiet reconciliation work with Species H community
      - private commercial outlets for sharpened goods
    standing_with_player_default: guarded
    voice: >
      Nkomo speaks softly in English with traces of Brazilian Portuguese
      under stress. The nickname is the captains'; she does not use it.
      She works in long silences. The blades she sharpens are sought by
      lords who would not invite her to dinner.
    hooks:
      - Nkomo requests private commission for a sharpened blade
      - the player carries a quiet message between her and Species H community
      - Volk discovers her route concealment and the player is implicated
      - Nkomo needs extraction from Iron Crown service

  - id: npc-butcher
    display_name: "The Butcher" (Petra Voss)
    faction_affiliation: iron-crown
    location: loc-port-newark-compound
    species: baseline-human
    age_at_game_start: 36
    manifestation: T7 Biological primary (pain induction through contact); Perceptual-T3 (sensing pain in others) secondary
    role: Iron Crown's primary interrogator
    goals:
      - extract intelligence Volk requires
      - maintain her position (no one else does her work)
      - private experimentation in pain limits
    relationships:
      - serves npc-volk
      - reluctant transactional with npc-silent-henry
      - feared by all captains
    resources:
      - interrogation cell
      - rare biological-pain specialty
    what_they_know:
      - what every captured Iron Crown enemy has told her
      - which captains have been interrogated for loyalty
    what_they_want_from_the_player:
      - rarely commissions externally; would request specific subjects
    standing_with_player_default: hostile-disturbing
    voice: >
      Voss speaks in clipped, matter-of-fact sentences. She does not
      take obvious pleasure in her work but she does not refuse it.
      Her demeanor is professional in a way that disturbs everyone she
      meets. She is one of the few people Volk treats with caution.
    hooks:
