# EMERGENCE — Macro Event Clocks
# Current segment values are at T+1yr (game start).
# Advance conditions use bible-sourced triggers where available; [UNSPECIFIED] where not.

clocks:

  - id: bourse-currency-stability
    display_name: Bourse Currency Stability
    current_segment: 5
    total_segments: 6
    advance_conditions:
      - continued uninterrupted Bourse-coin acceptance at major exchange points
      - successful arbitration of at least one major inter-faction commercial dispute
      - resolution of Iron Crown chit devaluation without regional crisis
    advance_rate: fast (estimated 1 segment per 3–6 months at T+1)
    completion_consequences:
      - Bourse copper becomes the formal regional standard
      - continuity scrip trades at a fixed (unfavorable) rate against copper
      - trade formalizes; contract law tied to Bourse arbitration spreads
      - House prestige realigns around copper-settlement capacity
    reset_conditions:
      - Bourse house schism or major default
      - South Philly Holding turns on Bourse
    interactions:
      - completion reduces probability of Iron Crown expansion (economic isolation)
      - completion accelerates Species I consolidation trajectory
    narrative_description: >
      The copper coin the merchants stamp is already doing the work of a standard;
      what remains is the final recognition. Two-thirds of mid-Atlantic trade already
      settles in Bourse copper. The last segment is the Lehigh Principalities signing
      a multi-year grain-for-coal contract denominated in copper, not barter. After
      that, the currency is simply what money is.

  - id: biokinetic-ag-saturation
    display_name: Biokinetic Agriculture Saturation
    current_segment: 5
    total_segments: 8
    advance_conditions:
      - diffusion of saturation-yield techniques through remaining biokinetic practitioners
      - establishment of training programs in new regions (Delmarva, Central NJ already complete)
      - harvest-over-harvest yield stability
    advance_rate: fast (Rogers S-curve past inflection; estimated 6–12 months per segment)
    completion_consequences:
      - regional food surplus becomes permanent
      - famine risk ends across mid-Atlantic (except in faction-collapse scenarios)
      - biokinetic-healer wages decouple from biokinetic-farmer wages (specialization hardens)
      - migration pressure into farm districts abates
    reset_conditions:
      - regional biokinetic-practitioner population collapse
      - climate shift or pest outbreak faster than diffusion
    interactions:
      - completion reduces faction-collapse probability across most scenarios
      - completion makes Delmarva Harvest Lords relatively more powerful
    narrative_description: >
      The technique is simple once learned. A biokinetic farmer who has seen it done
      can teach five apprentices in a season. Three years after the first Delmarva
      demonstration, most of the region's biokinetic farmers are using some version.
      Three more segments and the grain surplus is a structural fact. Nobody will
      starve through a bad winter again, unless the world breaks in some other way.

  - id: fed-continuity-erosion
    display_name: Fed Continuity Erosion
    current_segment: 4
    total_segments: 8
    advance_conditions:
      - Potomac Irregulars' continued operational independence
      - failed Fed Continuity expansion attempts (Baltimore failure already advanced this)
      - Alcott credibility deterioration events
      - scrip currency devaluation episodes
    advance_rate: moderate (estimated 1–2 segments per year)
    completion_consequences:
      - Colonel Reeve's Potomac Irregulars formally declare independence
      - Fed Continuity reduces to DC Mall / Pentagon enclave
      - continuity scrip collapses; holders face catastrophic losses
      - Virginia District territory reorganizes under Irregular rule
      - Species I Consolidation clock accelerates (Fed Continuity was an anchor for status quo)
    reset_conditions:
      - successful purge of Reeve faction
      - major Fed Continuity military victory (extremely unlikely)
    interactions:
      - completion shifts Species I clock forward
      - completion de-anchors Bourse-Continuity scrip arbitrage
    narrative_description: >
      The institution was built on the fiction that the country continued. The longer
      no citizen outside DC sees a federal officer, the thinner the fiction gets.
      Colonel Reeve in Virginia acts as if Alcott's orders are recommendations. The
      failed Baltimore expedition proved the reach isn't there. Half the clock has
      filled in a year. The rest will not take as long.

  - id: iron-crown-vs-staten
    display_name: Iron Crown vs. Staten Citadel
    current_segment: 3
    total_segments: 6
    advance_conditions:
      - Iron Crown salvage-toll escalations
      - Staten Citadel military demonstrations
      - failed mediation attempts (Bourse has tried twice)
      - killings of opposing faction members
    advance_rate: fast (moving 1 segment per 2–4 months)
    completion_consequences:
      - open war over Manhattan salvage access
      - Newark-Staten Island harbor becomes a combat zone
      - major disruption of salvage trade (Tower Lords affected heavily)
      - likely outcome favors Staten due to spatial-teleportation capability
      - Iron Crown succession crisis if Volk killed or humiliated
    reset_conditions:
      - negotiated Bourse-backed toll framework with formal adjustment mechanism
      - external threat forcing both to defensive postures
    interactions:
      - completion hurts Bourse commercial volume
      - completion indirectly empowers Tower Lords (less Iron Crown pressure)
      - Volk death from war could accelerate fragmentation of Iron Crown territory
    narrative_description: >
      It is a tariff dispute shaped like a feud. Viktor Chen holds the harbor;
      Volk wants Manhattan. The Bourse has negotiated twice and both times Volk
      broke the terms within a season. Three segments of six. The captains all
      know which way it's going. What none of them know is whether Volk survives it.

  - id: pine-barrens-expansion
    display_name: Pine Barrens / Listening Expansion
    current_segment: 3
    total_segments: 12
    advance_conditions:
      - Listening cult growth (SIS model indicates steady expansion)
      - Sprawl territorial creep past defensive boundaries
      - successful Listening proselytization in populated areas
      - faction inability to contain
    advance_rate: slow (1 segment per 1–2 years at current rate)
    completion_consequences:
      - The Listening breaches the Delaware line
      - populated southern NJ townships enter corruption contact
      - potential collapse of Central Jersey League southern townships
      - Species I Reyes-kin directly threatened
      - regional existential response required
    reset_conditions:
      - successful coordinated faction strike against Listening core
      - One Who Waits death or dispersal
      - neither has ever been attempted
    interactions:
      - completion resets most other clocks (regional crisis)
      - completion may trigger alliance formations not otherwise possible
    narrative_description: >
      Twelve segments was a generous estimate. The cult grows by a few thousand
      each season. The Sprawl creeps outward a field a year. One Who Waits speaks
      through messengers once or twice a year. The clock moves slowly, but every
      segment is a measure of how much land is quietly passing from factions to
      something else.

  - id: crabclaw-fed-war
    display_name: Crabclaw Confederation – Fed Continuity War
    current_segment: 3
    total_segments: 6
    advance_conditions:
      - Fed Continuity expansion attempts into Baltimore region (one failure so far)
      - Crabclaw military strengthening
      - border incidents
    advance_rate: moderate (1 segment per 8–14 months)
    completion_consequences:
      - open war along Chesapeake line
      - disruption of Delmarva–Crabclaw–Bourse trade
      - likely Continuity withdrawal (won't win); acceleration of erosion clock
      - Crabclaw may formally annex some Fed Continuity districts
    reset_conditions:
      - Alcott cedes Baltimore claims formally
      - Crabclaw internal collapse (three T7 warlords are uneasy)
    interactions:
      - completion accelerates Fed Continuity erosion
      - completion disrupts Delmarva exports northward briefly
    narrative_description: >
      Alcott's attempt to re-impose federal authority over the Crabclaw lords
      failed. The three Baltimore warlords now know they do not have to bend.
      What they are learning is whether they can push. The clock is moving
      because Fed Continuity cannot accept the loss of Baltimore permanently
      and the Crabclaw lords cannot accept the loss of their independence.

  - id: catskill-throne-tribute
    display_name: Catskill Throne Formal Vassalage
    current_segment: 2
    total_segments: 6
    advance_conditions:
      - successful tribute collection cycles
      - Preston personal demonstrations of force where challenged
      - incremental demand increases accepted by tributaries
    advance_rate: slow (1 segment per 1–2 years)
    completion_consequences:
      - Hudson Valley polities (Bear-House, Yonkers Compact, several smaller) become formal vassals
      - Catskill Throne gains direct resource-requisition rights
      - Yonkers Compact internal crisis (was founded on horizontal non-subordination)
      - Bear-House of Peekskill may resist and fracture
    reset_conditions:
      - Preston death or incapacitation
      - coordinated tributary revolt
    interactions:
      - completion changes regional power balance; Catskill Throne becomes clearly dominant in upper Hudson
      - Preston's personal mortality affects this clock's meaningfulness
    narrative_description: >
      Tribute is already paid. The question is what the tribute means. Preston
      is slowly converting what began as protection-money into the formal language
      of lordship. Two segments filled. The Yonkers Three Judges have not yet
      had to decide whether they will kneel; the clock is what counts down to
      that decision.

  - id: species-i-consolidation
    display_name: Species I Formal Polity Declaration
    current_segment: 2
    total_segments: 8
    advance_conditions:
      - Tomás Reyes faction advancement
      - generational turnover in kin-network leadership
      - external pressure forcing coordination
      - Fed Continuity weakness (removes anchor of status quo)
    advance_rate: variable — 8 year spread across estimated firing window (T+3 to T+25)
    completion_consequences:
      - formal Species I polity declared
      - territorial claims in western Philadelphia and PG County corridor
      - regional political realignment
      - baseline-human factions either ally (Bourse, CJL) or resist (Iron Crown, Irregulars)
    reset_conditions:
      - Tomás Reyes death
      - Flores-kin successful conservative reassertion
    interactions:
      - Fed Continuity erosion accelerates this
      - Bourse currency stability makes this more viable
      - Iron Crown aggression could force early declaration
    narrative_description: >
      Elder Flores is old. Tomás Reyes is not. Between them is the question of
      whether Species I should be a people or a polity. The kin networks are
      already the largest coherent population in the mid-Atlantic. What they are
      not yet is a country. The clock ticks when Reyes wins an assembly argument,
      when Fed Continuity loses another district, when Iron Crown insults one of
      their own.

  - id: manhattan-eldritch-breach
    display_name: Manhattan Anomalous Entity Breach
    current_segment: 2
    total_segments: 8
    advance_conditions:
      - Echo territorial expansion (not observed yet, but monitored)
      - appearance of additional anomalous entities in salvage zones
      - deep-salvage expeditions triggering dormant events
    advance_rate: slow (1 segment per 1–3 years)
    completion_consequences:
      - anomalous entities push outside Financial District
      - Manhattan salvage economy disrupted
      - Tower Lords' primary revenue source threatened
      - regional response required; may accelerate eldritch-concerned faction alliances
    reset_conditions:
      - successful containment intervention (no known method)
      - Echo dispersal
    interactions:
      - completion hurts Staten Citadel (salvage dependent)
      - completion strengthens anti-eldritch faction alliances
    narrative_description: >
      The Echo has not moved in four years. That is the comforting fact. The
      uncomfortable fact is that nobody knows what would move it, and the deep-salvage
      runs go further each year. Two segments of eight. The clock moves in small
      increments — a salvager goes in and doesn't come out, a building in the
      lower east appears to have shifted overnight, someone reports hearing
      something no one else heard. The clock does not move quickly. It only ever
      moves.

  - id: harvest-lords-unification
    display_name: Delmarva Harvest Lords Unification
    current_segment: 1
    total_segments: 8
    advance_conditions:
      - external military threat forcing coordination
      - succession events creating consolidation opportunity
      - Bourse commercial pressure
      - generational leadership turnover
    advance_rate: very slow (1 segment per 2–4 years)
    completion_consequences:
      - unified Delmarva polity declared (under a single lord or council)
      - regional agricultural superpower emerges
      - Philadelphia Bourse pricing relationship changes
      - potential military action against Crabclaw or northward expansion
    reset_conditions:
      - dominant lord faction's patron dies without succession
      - internal harvest lord war
    interactions:
      - completion transforms regional political map
      - completion gives Delmarva food-supply leverage equivalent to military power
    narrative_description: >
      The six major lords prefer their individual freedoms. None wants to kneel
      to another. None wants to be kneeled to, quite. One segment filled in four
      years. The clock moves when external pressure rises — when Crabclaw turns
      north, when Fed Continuity tries to levy them, when the Bourse proposes a
      price structure they can't refuse. If they unify, they will be the region's
      second great power after Catskill. If they never do, they will be the
      region's granary, which is perhaps enough.
