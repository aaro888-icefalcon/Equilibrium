  manifestation_rate_humans: 0.95
  manifestation_rate_post_onset_generation: 0.99
  manifestation_rate_animals: 0.60  # contested; estimate from Part XXVII
  # Part XVII and Part XXVIII use different animal manifestation rates;
  # [CONTRADICTION: Part XXVIII uses per-class rates summing to ~29.5M manifested,
  # Part XXVII uses 60% of ~18M = ~10.8M. Selecting Part XXVII figure per simulation output alignment.]

  profile_distribution:
    single_domain_narrow: 0.45
    single_domain_broad: 0.15
    two_domain: 0.28
    three_domain: 0.09
    diffuse_unusual: 0.03

  primary_domain_fractions:
    physical: 0.28
    perceptual: 0.15
    matter_energy: 0.14
    biological: 0.14
    auratic: 0.12
    temporal_spatial: 0.09
    eldritch: 0.015        # very rare as primary

  tier_pyramid_humans:       # baseline, fraction of manifested
    T1: 0.40
    T2: 0.25
    T3: 0.15
    T4: 0.10
    T5: 0.05
    T6: 0.03
    T7: 0.015
    T8: 0.004
    T9: 0.0008
    T10_plus: 0.00005
    beyond_T10: 1e-5

  tier_pyramid_animals:      # distribution within manifested animals
    T1: 0.55
    T2: 0.25
    T3: 0.13
    T4: 0.045
    T5: 0.020
    T6: 0.003              # sentience threshold
    T7: 0.001
    T8: 0.0001
    T9: 0.00001
    T10_plus: 0.000002

  use_frequency_by_tier:
    T1: {daily: 0.85, weekly: 0.10, rare: 0.04, almost_never: 0.01}
    T5: {daily: 0.30, weekly: 0.40, rare: 0.25, almost_never: 0.05}
    T9: {daily: 0.05, weekly: 0.20, rare: 0.50, almost_never: 0.25}

  breakthrough_types: [depth, breadth, integration]
  breakthrough_catalysts: [life_threat, sacrifice, mentorship, exposure, domain_crisis, loss_of_profile]

