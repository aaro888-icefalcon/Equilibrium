# EMERGENCE — LORDLY EQUILIBRIUM
# Canonical constants. Ground truth from Part 1 of the bible.

worldline:
  id: lordly-equilibrium
  archetype_probability: 0.049        # 4.9% of total scenario space
  baseline_pyramid_fraction: 0.148    # 14.8% of baseline-pyramid worldlines
  simulation_runs: 2000
  archetype_matches: 296
  selection_method: median-composite
  primary_tier_pyramid: baseline
  primary_mortality_profile: severe-Y1
  primary_trajectory: stagnant-T30

timeline:
  onset_date: "late May, pre-Onset Year 0"
  onset_time_utc: "14:23"
  game_start: T+1yr          # exact: game opens one year after Onset
  projection_horizon: T+30yr
  era_boundaries:
    acute: [T+0, T+6mo]
    consolidation: [T+6mo, T+3yr]
    equilibrium: [T+3yr, T+10yr]
    multipolar: [T+10yr, T+30yr]

population:
  pre_onset: 50_000_000           # mid-Atlantic
  y1_total: 15_940_000
  y7_total: 15_650_000
  y15_total: 15_130_000
  y30_total: 12_420_000
  y1_mortality: 0.681             # range p05–p95: 0.626–0.769
  y30_range_p05: 9_800_000
  y30_range_p95: 17_500_000
  post_onset_born_by_y30: 7_310_000     # approx; surviving post-Onset-born
  post_onset_manifested_y30: 7_250_000  # ~99% of post-Onset generation

  zones:                          # Y1 populations by zone
    dc_fed_core: 4_800_000
    outer_boroughs_li: 4_890_000
    hudson_valley: 2_870_000
    philadelphia_metro: 2_520_000
    central_nj: 1_690_000
    delmarva: 1_150_000
    chesapeake_north: 1_080_000
    lehigh_poconos: 990_000
    newark_jc: 740_000
    catskills_upper_hudson: 530_000
    manhattan_core: 250_000
    pine_barrens: 70_000

  sex_ratio_y1: 0.787             # M/F, overall
  sex_ratio_reproductive_y1: 0.701 # M/F, 20-44
  sex_ratio_y30: 0.909
  tfr_pre_onset: 1.65
  tfr_y1: 1.0
  tfr_y7: 2.0
  tfr_y30: 3.2
  life_expectancy_regional_y1: 42 # years
  life_expectancy_pre_onset: 78

  metahuman_fraction_y1: 0.19     # 19% of survivors; elevated vs pre-Onset 10%
